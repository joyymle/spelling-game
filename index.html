<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Master - เกมสะกดคำตัวพิมพ์เล็ก</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Mali:wght@400;600&display=swap');
        :root {
            --primary: #5f27cd;
            --secondary: #1dd1a1;
            --danger: #ff6b6b;
            --dark: #222f3e;
            --light: #f8f9fa;
            --gray: #c8d6e5;
        }
        body {
            font-family: 'Mali', cursive;
            background-color: #341f97;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--light);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        @media (min-width: 500px) {
            .app-container {
                height: 90vh;
                border-radius: 30px;
                border: 8px solid #111;
            }
        }
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }
        .screen.active {
            display: flex;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-weight: 600;
            color: var(--dark);
        }
        .score-badge {
            color: #f39c12;
            font-size: 1.2rem;
            font-family: 'Fredoka', sans-serif;
        }
        .level-text {
            color: var(--primary);
            font-weight: 700;
        }
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero-section h1 {
            font-family: 'Fredoka', sans-serif;
            color: var(--primary);
            font-size: 3.8rem;
            margin: 0;
            line-height: 1.1;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        .hero-section p {
            font-size: 1.2rem;
            color: #555;
            margin-top: 10px;
            margin-bottom: 40px;
        }
        .btn-primary {
            background-color: var(--secondary);
            color: white;
            border: none;
            border-bottom: 6px solid #10ac84;
            border-radius: 20px;
            padding: 20px 40px;
            font-size: 1.8rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            width: 80%;
        }
        .btn-primary:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            margin-top: 4px;
        }
        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            min-height: 160px;
        }
        .emoji-display {
            font-size: 5rem;
            margin: 0;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }
        .thai-word {
            font-size: 1.5rem;
            color: #666;
            margin-top: 5px;
            font-weight: 600;
        }
        .slots-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .slot {
            width: 45px;
            height: 55px;
            background-color: white;
            border: 3px dashed var(--gray);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem; /* ขยายฟอนต์ตัวเล็กให้เห็นชัดขึ้น */
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            padding-bottom: 5px; /* ปรับให้ตัวเล็กอยู่กึ่งกลางสวยงาม */
        }
        .slot.filled {
            border-style: solid;
            border-color: var(--primary);
            background-color: #e1e5f2;
            box-shadow: 0 4px 0 var(--gray);
        }
        .slot.correct-anim {
            background-color: var(--secondary);
            border-color: #10ac84;
            color: white;
            animation: bounce 0.4s ease;
        }
        .slot.wrong-anim {
            background-color: var(--danger);
            border-color: #ee5253;
            color: white;
            animation: shake 0.4s ease;
        }
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 0 5px;
        }
        .key {
            width: 50px;
            height: 60px;
            background-color: white;
            border: 3px solid var(--gray);
            border-bottom: 6px solid var(--gray);
            border-radius: 10px;
            font-size: 2rem; /* ขยายฟอนต์ตัวเล็กให้เห็นชัดขึ้น */
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: var(--dark);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
            padding-bottom: 5px; /* ปรับให้ตัวเล็กอยู่กึ่งกลางสวยงาม */
        }
        .key:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .key.hidden {
            visibility: hidden;
            pointer-events: none;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
            text-align: center;
        }
        .overlay h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            color: var(--primary);
        }
        .btn-text {
            background: none; border: none; color: var(--danger);
            font-weight: bold; font-size: 1.2rem; cursor: pointer; padding: 5px;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HOME SCREEN -->
        <div id="screen-home" class="screen active">
            <div class="top-bar">
                <div class="level-text">Hard Mode</div>
                <div class="score-badge">⭐ <span id="home-score">0</span></div>
            </div>
            <div class="hero-section">
                <h1>Spell<br>It!</h1>
                <p>เรียงตัวอักษรพิมพ์เล็ก (มีตัวหลอก)</p>
                <button class="btn-primary" onclick="startGame()">Start Game</button>
            </div>
        </div>
        <!-- GAME SCREEN -->
        <div id="screen-game" class="screen">
            <div class="top-bar">
                <button class="btn-text" onclick="showScreen('home')">❌ Quit</button>
                <div class="score-badge">ข้อ <span id="q-count">1</span>/5</div>
            </div>
            <div class="image-container">
                <div id="display-emoji" class="emoji-display">🐯</div>
                <div id="display-thai" class="thai-word">เสือ</div>
            </div>
            <div id="slots-area" class="slots-container"></div>
            <div id="keyboard-area" class="keyboard"></div>
        </div>
        <!-- END SCREEN -->
        <div id="screen-end" class="overlay">
            <h2>Great Job! 🎉</h2>
            <p style="font-size: 1.2rem; margin-top: 10px;">เก่งมาก! ตอบถูก <span id="final-score" style="font-weight:bold; color:var(--primary); font-size:1.5rem;">0</span> ข้อ</p>
            <button class="btn-primary" style="margin-top: 30px;" onclick="showScreen('home')">Play Again</button>
        </div>
    </div>
    <script>
        // เปลี่ยนคำศัพท์เป็นตัวพิมพ์เล็กทั้งหมด
        const wordDatabase = [
            { word: 'bird', emoji: '🐦', thai: 'นก' },
            { word: 'ant', emoji: '🐜', thai: 'มด' },
            { word: 'cat', emoji: '🐈', thai: 'แมว' },
            { word: 'dog', emoji: '🐶', thai: 'สุนัข' },
            { word: 'fish', emoji: '🐟', thai: 'ปลา' },
            { word: 'gun', emoji: '🔫', thai: 'ปืน' },
            { word: 'hen', emoji: '🐔', thai: 'แม่ไก่' },
            { word: 'ink', emoji: '🖋️', thai: 'หมึก' },
            { word: 'jar', emoji: '🫙', thai: 'ตุ่ม' },
            { word: 'fan', emoji: '𖣘', thai: 'พัดลม' }
        ];

        let state = {
            totalStars: 0,
            currentQ: 0,
            totalQ: 5,
            currentWordObj: null,
            spelledLetters: [], 
            availableKeys: [], 
            questions: []
        };

        try {
            let saved = localStorage.getItem('spell_stars_hard');
            if(saved) state.totalStars = parseInt(saved);
        } catch(e) {
            console.warn("Storage blocked, starting from 0");
        }

        document.getElementById('home-score').innerText = state.totalStars;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-end').style.display = 'none'; 
            
            if(screenId === 'end') {
                document.getElementById('screen-end').style.display = 'flex';
            } else {
                document.getElementById(`screen-${screenId}`).classList.add('active');
            }

            if(screenId === 'home') {
                document.getElementById('home-score').innerText = state.totalStars;
            }
        }

        window.startGame = function() {
            state.currentQ = 0;
            state.questions = [...wordDatabase].sort(() => Math.random() - 0.5).slice(0, state.totalQ);
            showScreen('game');
            nextQuestion();
        }

        function nextQuestion() {
            if (state.currentQ >= state.totalQ) {
                endGame();
                return;
            }

            state.currentWordObj = state.questions[state.currentQ];
            state.spelledLetters = Array(state.currentWordObj.word.length).fill(null);
            state.currentQ++;

            document.getElementById('q-count').innerText = state.currentQ;
            document.getElementById('display-emoji').innerText = state.currentWordObj.emoji;
            document.getElementById('display-thai').innerText = state.currentWordObj.thai;
            
            setupSlots();
            setupKeyboard();
        }

        function setupSlots() {
            const container = document.getElementById('slots-area');
            container.innerHTML = ''; 

            for(let i = 0; i < state.currentWordObj.word.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${i}`;
                slot.onclick = () => removeLetter(i);
                container.appendChild(slot);
            }
        }

        function setupKeyboard() {
            const container = document.getElementById('keyboard-area');
            container.innerHTML = '';

            let letters = state.currentWordObj.word.split('');
            // เปลี่ยนชุดตัวอักษรหลอกให้เป็นตัวพิมพ์เล็กทั้งหมด
            const alphabet = "abcdefghijklmnopqrstuvwxyz";
            
            for(let i = 0; i < 4; i++) {
                letters.push(alphabet[Math.floor(Math.random() * alphabet.length)]);
            }
            
            letters.sort(() => Math.random() - 0.5);

            state.availableKeys = letters.map((char, index) => ({ id: index, char: char, used: false }));
            state.availableKeys.forEach(keyData => {
                const btn = document.createElement('div');
                btn.className = 'key';
                btn.id = `key-${keyData.id}`;
                btn.innerText = keyData.char;
                btn.onclick = () => addLetter(keyData.id);
                container.appendChild(btn);
            });
        }

        function addLetter(keyId) {
            const keyData = state.availableKeys.find(k => k.id === keyId);
            if(keyData.used) return; 
            
            const emptyIndex = state.spelledLetters.findIndex(l => l === null);
            if(emptyIndex === -1) return; 
            
            state.spelledLetters[emptyIndex] = keyData;
            keyData.used = true;
            updateUI();

            if(state.spelledLetters.every(l => l !== null)) {
                setTimeout(checkAnswer, 200); 
            }
        }

        function removeLetter(slotIndex) {
            const keyData = state.spelledLetters[slotIndex];
            if(!keyData) return;
            keyData.used = false; 
            state.spelledLetters[slotIndex] = null;
            updateUI();
        }

        function updateUI() {
            for(let i = 0; i < state.spelledLetters.length; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if(state.spelledLetters[i]) {
                    slot.innerText = state.spelledLetters[i].char;
                    slot.classList.add('filled');
                } else {
                    slot.innerText = '';
                    slot.classList.remove('filled');
                }
            }
            
            state.availableKeys.forEach(k => {
                const btn = document.getElementById(`key-${k.id}`);
                if(k.used) {
                    btn.classList.add('hidden');
                } else {
                    btn.classList.remove('hidden');
                }
            });
        }

        function checkAnswer() {
            const currentAnswer = state.spelledLetters.map(k => k.char).join('');
            const isCorrect = currentAnswer === state.currentWordObj.word;
            const slots = document.querySelectorAll('.slot');
            
            if(isCorrect) {
                slots.forEach(s => s.classList.add('correct-anim'));
                state.totalStars += 1;

                try {
                    localStorage.setItem('spell_stars_hard', state.totalStars);
                } catch(e){}
                
                setTimeout(nextQuestion, 1000);
            } else {
                slots.forEach(s => s.classList.add('wrong-anim'));
                setTimeout(() => {
                    slots.forEach(s => s.classList.remove('wrong-anim'));
                    state.spelledLetters.forEach(k => { if(k) k.used = false; });
                    state.spelledLetters = Array(state.currentWordObj.word.length).fill(null);
                    updateUI();
                }, 800);
            }
        }

        function endGame() {
            document.getElementById('final-score').innerText = state.totalQ;
            showScreen('end');
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {}, 150);
        });
    </script>
</body>
</html>
